<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" width="520" height="400">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C67B5C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E8A87C;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16A34A;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333EA;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0891B2;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="slateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#475569;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#334155;stop-opacity:0.7"/>
    </linearGradient>
    <linearGradient id="infraGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#64748B;stop-opacity:0.12"/>
      <stop offset="50%" style="stop-color:#64748B;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#64748B;stop-opacity:0.12"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
  </defs>

  <!-- Layer labels (left side) -->
  <text x="10" y="62" font-family="-apple-system,sans-serif" font-size="8" fill="#9E8E85" font-weight="500" letter-spacing="0.5">C-END</text>
  <text x="10" y="152" font-family="-apple-system,sans-serif" font-size="8" fill="#9E8E85" font-weight="500" letter-spacing="0.5">B-END</text>
  <text x="10" y="242" font-family="-apple-system,sans-serif" font-size="8" fill="#9E8E85" font-weight="500" letter-spacing="0.5">ENGINE</text>
  <text x="10" y="332" font-family="-apple-system,sans-serif" font-size="8" fill="#9E8E85" font-weight="500" letter-spacing="0.5">INFRA</text>

  <!-- ═══ Layer 1: C-end Products ═══ -->
  <!-- Lucrum -->
  <rect x="55" y="40" width="108" height="38" rx="10" fill="url(#blueGrad)" filter="url(#glow)"/>
  <text x="83" y="63" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="white">Lucrum</text>
  <text x="83" y="63" font-family="-apple-system,sans-serif" font-size="6" fill="rgba(255,255,255,0.6)" dx="52">量化</text>

  <!-- Switch -->
  <rect x="175" y="40" width="108" height="38" rx="10" fill="url(#greenGrad)" filter="url(#glow)"/>
  <text x="203" y="63" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="white">Switch</text>
  <text x="203" y="63" font-family="-apple-system,sans-serif" font-size="6" fill="rgba(255,255,255,0.6)" dx="47">桌面</text>

  <!-- Creator -->
  <rect x="295" y="40" width="108" height="38" rx="10" fill="#C67B7B" filter="url(#glow)"/>
  <text x="321" y="63" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="white">Creator</text>
  <text x="321" y="63" font-family="-apple-system,sans-serif" font-size="6" fill="rgba(255,255,255,0.6)" dx="52">内容</text>

  <!-- Lutu -->
  <rect x="415" y="40" width="90" height="38" rx="10" fill="url(#slateGrad)" filter="url(#glow)"/>
  <text x="442" y="63" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="white">Lutu</text>
  <text x="442" y="63" font-family="-apple-system,sans-serif" font-size="6" fill="rgba(255,255,255,0.6)" dx="30">移动</text>

  <!-- ═══ Layer 2: B-end Products ═══ -->
  <!-- Lurus API -->
  <rect x="55" y="130" width="148" height="38" rx="10" fill="url(#brandGrad)" filter="url(#glow)"/>
  <text x="98" y="153" font-family="-apple-system,sans-serif" font-size="12" font-weight="700" fill="white">Lurus API</text>
  <text x="98" y="153" font-family="-apple-system,sans-serif" font-size="6" fill="rgba(255,255,255,0.6)" dx="68">LLM 网关</text>

  <!-- Forge -->
  <rect x="215" y="130" width="108" height="38" rx="10" fill="#C6A87B" filter="url(#glow)"/>
  <text x="245" y="153" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="white">Forge</text>
  <text x="245" y="153" font-family="-apple-system,sans-serif" font-size="6" fill="rgba(255,255,255,0.6)" dx="40">工作台</text>

  <!-- Lumen -->
  <rect x="335" y="130" width="108" height="38" rx="10" fill="#AF8B7B" filter="url(#glow)"/>
  <text x="364" y="153" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="white">Lumen</text>
  <text x="364" y="153" font-family="-apple-system,sans-serif" font-size="6" fill="rgba(255,255,255,0.6)" dx="46">可观测</text>

  <!-- ═══ Connecting lines Layer 1 → Layer 2 ═══ -->
  <line x1="109" y1="78" x2="129" y2="130" stroke="#7B8EC6" stroke-width="1" opacity="0.25" stroke-dasharray="3,3"/>
  <line x1="229" y1="78" x2="200" y2="130" stroke="#16A34A" stroke-width="1" opacity="0.25" stroke-dasharray="3,3"/>
  <line x1="349" y1="78" x2="269" y2="130" stroke="#C67B7B" stroke-width="1" opacity="0.25" stroke-dasharray="3,3"/>

  <!-- ═══ Layer 3: Core Engines ═══ -->
  <!-- Kova -->
  <rect x="85" y="220" width="168" height="42" rx="10" fill="url(#greenGrad)" filter="url(#glow)"/>
  <text x="130" y="245" font-family="-apple-system,sans-serif" font-size="13" font-weight="800" fill="white">Kova</text>
  <text x="161" y="245" font-family="-apple-system,sans-serif" font-size="8" fill="rgba(255,255,255,0.7)">持久执行 · Rust · 3us</text>

  <!-- MemX -->
  <rect x="270" y="220" width="168" height="42" rx="10" fill="url(#purpleGrad)" filter="url(#glow)"/>
  <text x="315" y="245" font-family="-apple-system,sans-serif" font-size="13" font-weight="800" fill="white">MemX</text>
  <text x="345" y="245" font-family="-apple-system,sans-serif" font-size="8" fill="rgba(255,255,255,0.7)">智能记忆 · ACE v2.0</text>

  <!-- Connecting lines Layer 2 → Layer 3 -->
  <line x1="129" y1="168" x2="169" y2="220" stroke="#C67B5C" stroke-width="1.2" opacity="0.3" stroke-dasharray="3,3"/>
  <line x1="269" y1="168" x2="239" y2="220" stroke="#C6A87B" stroke-width="1.2" opacity="0.3" stroke-dasharray="3,3"/>
  <line x1="389" y1="168" x2="354" y2="220" stroke="#AF8B7B" stroke-width="1.2" opacity="0.3" stroke-dasharray="3,3"/>

  <!-- Animated data flow dots -->
  <circle r="3" fill="#C67B5C" opacity="0.8">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M129,168 L169,220"/>
  </circle>
  <circle r="3" fill="#9333EA" opacity="0.8">
    <animateMotion dur="3s" repeatCount="indefinite" path="M389,168 L354,220"/>
  </circle>

  <!-- ═══ Layer 4: Infrastructure ═══ -->
  <rect x="55" y="310" width="450" height="38" rx="10" fill="url(#infraGrad)" stroke="#64748B" stroke-width="0.6" stroke-opacity="0.25"/>
  <text x="280" y="333" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" font-weight="600" fill="#64748B" letter-spacing="1">Platform  ·  Auth (OIDC)  ·  Billing  ·  Notification  ·  K8s + GitOps</text>

  <!-- Connecting lines Layer 3 → Layer 4 -->
  <line x1="169" y1="262" x2="169" y2="310" stroke="#64748B" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.2"/>
  <line x1="354" y1="262" x2="354" y2="310" stroke="#64748B" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.2"/>

  <!-- Outer glow ring (subtle brand) -->
  <rect x="45" y="30" width="468" height="328" rx="16" fill="none" stroke="url(#brandGrad)" stroke-width="1" opacity="0.15"/>
</svg>
