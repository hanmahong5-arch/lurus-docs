<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 36" width="160" height="36">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C67B5C"/>
      <stop offset="100%" style="stop-color:#E8A87C"/>
    </linearGradient>
  </defs>
  <!-- L mark: two geometric bars -->
  <rect x="2" y="4" width="5" height="22" rx="2" fill="url(#logoGrad)"/>
  <rect x="2" y="21" width="14" height="5" rx="2" fill="url(#logoGrad)"/>
  <!-- Wordmark: Lurus -->
  <text x="24" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" letter-spacing="-0.3" fill="#3D3530">Lurus</text>
  <!-- Divider -->
  <line x1="84" y1="10" x2="84" y2="26" stroke="#DDD5CC" stroke-width="1"/>
  <!-- Docs label -->
  <text x="92" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="500" letter-spacing="0.02em" fill="#9E8E85">Docs</text>
</svg>
