name: Sync, Build & Deploy lurus-docs

on:
  push:
    branches: [main]
    paths:
      - 'lurus-docs/**'
      - 'lurus-api/docs/openapi/relay.json'
      - 'lurus.yaml'
  schedule:
    # Weekly auto-sync every Monday at 02:00 UTC.
    - cron: '0 2 * * 1'
  workflow_dispatch:

defaults:
  run:
    working-directory: lurus-docs

jobs:
  sync-build-deploy:
    name: Sync → Build → Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write        # allow git commit on cron/dispatch runs
      packages: write        # allow push to GHCR

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          # Full history so git commit can be made on cron runs.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Run sync on scheduled / manual runs so docs stay current
      # even without a code push.  On push runs the commit already
      # contains the synced content, so sync is a no-op but harmless.
      - name: Sync docs from sources
        run: bun run sync

      - name: Commit sync changes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add docs/api/overview.md docs/webmail/client-setup.md
            git commit -m "chore(docs): auto-sync endpoints and webmail config"
            git push
          else
            echo "No sync changes to commit."
          fi

      - name: Build VitePress site
        run: bun run build

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: lurus-docs
          file: lurus-docs/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/lurus-docs:latest
            ghcr.io/${{ github.repository_owner }}/lurus-docs:${{ github.sha }}

      - name: Rolling restart on k3s
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.K3S_HOST }}
          username: root
          key: ${{ secrets.K3S_SSH_KEY }}
          script: |
            kubectl rollout restart deployment/lurus-docs -n docs
            kubectl rollout status  deployment/lurus-docs -n docs --timeout=120s
