name: Build & Deploy lurus-docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'server/**'
      - 'scripts/**'
      - 'package.json'
      - 'Dockerfile'
      - 'deploy/**'
  schedule:
    # Weekly auto-sync every Monday at 02:00 UTC.
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  build-deploy:
    name: Sync → Build → Deploy
    runs-on: ubuntu-latest
    # Skip CI-triggered commits to prevent infinite loops
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write        # allow git commit on cron/dispatch runs
      packages: write        # allow push to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync docs from sources
        run: bun run sync
        continue-on-error: true

      - name: Commit sync changes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add docs/api/overview.md
            git commit -m "chore(docs): auto-sync endpoints [skip ci]"
            git push
          else
            echo "No sync changes to commit."
          fi

      - name: Compute image tag
        id: tag
        run: echo "sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/lurus-docs:latest
            ghcr.io/${{ github.repository_owner }}/lurus-docs:main-${{ steps.tag.outputs.sha }}

      - name: Update deployment manifest with new image tag
        run: |
          sed -i "s|image: ghcr.io/hanmahong5-arch/lurus-docs:.*|image: ghcr.io/hanmahong5-arch/lurus-docs:main-${{ steps.tag.outputs.sha }}|" deploy/k8s.yaml
          echo "Updated image tag to main-${{ steps.tag.outputs.sha }}"
          grep 'image:' deploy/k8s.yaml

      - name: Commit and push manifest update
        run: |
          git add deploy/k8s.yaml
          if ! git diff --cached --quiet; then
            git commit -m "deploy(docs): update image to main-${{ steps.tag.outputs.sha }} [skip ci]"
            git push
          else
            echo "No manifest changes."
          fi

      - name: Wait for ArgoCD sync and verify
        run: |
          echo "Waiting 90s for ArgoCD auto-sync..."
          sleep 90
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 https://docs.lurus.cn/api/health)
          echo "Health check: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check returned $STATUS (may need more time for sync)"
            exit 1
          fi
          echo "Deployment verified successfully."

      - name: Notify docs webhook (self-track deployment)
        if: success()
        continue-on-error: true
        run: |
          PAYLOAD=$(cat <<EOF
          {"product":"lurus-docs","version":"main-${{ steps.tag.outputs.sha }}","title":"lurus-docs deployed (main-${{ steps.tag.outputs.sha }})","type":"improvement","content":"Deployed from CI/CD.\n\nCommit: ${{ steps.tag.outputs.sha }}\nMessage: ${{ github.event.head_commit.message }}"}
          EOF
          )
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.DOCS_WEBHOOK_SECRET }}" | awk '{print $2}')
          curl -s -X POST https://docs.lurus.cn/api/webhook/deploy \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Signature: sha256=$SIGNATURE" \
            -d "$PAYLOAD" || true
