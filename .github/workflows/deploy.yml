name: Build & Deploy lurus-docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/**'
      - 'package.json'
      - 'Dockerfile'
      - 'deploy/**'
  schedule:
    # Weekly auto-sync every Monday at 02:00 UTC.
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  build-deploy:
    name: Sync → Build → Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write        # allow git commit on cron/dispatch runs
      packages: write        # allow push to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync docs from sources
        run: bun run sync
        continue-on-error: true

      - name: Commit sync changes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add docs/api/overview.md docs/webmail/client-setup.md
            git commit -m "chore(docs): auto-sync endpoints and webmail config"
            git push
          else
            echo "No sync changes to commit."
          fi

      - name: Build VitePress site
        run: bun run build

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/lurus-docs:latest
            ghcr.io/${{ github.repository_owner }}/lurus-docs:${{ github.sha }}

      - name: Rolling restart on k3s
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.K3S_HOST }}
          username: root
          key: ${{ secrets.K3S_SSH_KEY }}
          script: |
            kubectl rollout restart deployment/lurus-docs -n lurus-system
            kubectl rollout status  deployment/lurus-docs -n lurus-system --timeout=120s

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.K3S_HOST }}
          username: root
          key: ${{ secrets.K3S_SSH_KEY }}
          script: |
            sleep 10
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' https://docs.lurus.cn/)
            echo "Homepage: HTTP $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "Homepage verification failed!"
              exit 1
            fi
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' https://docs.lurus.cn/memx/)
            echo "MemX page: HTTP $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "Subpage verification failed!"
              exit 1
            fi
            echo "Deployment verified successfully."
