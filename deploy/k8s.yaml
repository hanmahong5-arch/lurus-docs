apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lurus-docs-data
  namespace: lurus-system
  labels:
    app: lurus-docs
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
# Secret `lurus-docs-secrets` is managed manually (kubectl apply).
# Keys: admin-api-key, webhook-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lurus-docs
  namespace: lurus-system
  labels:
    app: lurus-docs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lurus-docs
  template:
    metadata:
      labels:
        app: lurus-docs
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: lurus-docs
          image: ghcr.io/hanmahong5-arch/lurus-docs:main-3b010b9
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: DB_PATH
              value: "/data/updates.db"
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lurus-docs-secrets
                  key: admin-api-key
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: lurus-docs-secrets
                  key: webhook-secret
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lurus-docs-secrets
                  key: internal-api-key
          resources:
            requests:
              memory: "64Mi"
              cpu: "20m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: lurus-docs-data
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: lurus-docs
  namespace: lurus-system
  labels:
    app: lurus-docs
spec:
  selector:
    app: lurus-docs
  ports:
    - name: http
      port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: lurus-docs-route
  namespace: lurus-system
  labels:
    app: lurus-docs
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`docs.lurus.cn`)
      kind: Rule
      services:
        - name: lurus-docs
          port: 80
  tls:
    secretName: lurus-cn-wildcard-tls
